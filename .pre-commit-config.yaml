repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix]
        files: '^(api|\.github/scripts)/.*\.py$'
      # Run the formatter
      - id: ruff-format
        files: '^(api|\.github/scripts)/.*\.py$'

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'cd api && uv run --frozen --group dev pytest tests/'
        language: system
        pass_filenames: false
        files: '^api/.*\.py$'
        stages: [pre-commit]
      - id: frontend-lockfile-sync
        name: frontend lockfile sync
        entry: bash -c 'cd frontend && rm -rf node_modules package-lock.json && npm install --silent --no-fund --no-audit && git add package-lock.json'
        language: system
        pass_filenames: false
        files: '^frontend/package\.json$'
        stages: [pre-commit]
      - id: ty
        name: ty
        # Check api/ as a project + the standalone scripts under .github/.
        entry: bash -c 'cd api && uv run ty check && uv run ty check ../.github/scripts'
        language: system
        pass_filenames: false
        files: '^(api|\.github/scripts)/.*\.py$'
        stages: [pre-commit]
      - id: frontend-typecheck
        name: frontend typecheck
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        pass_filenames: false
        files: '^frontend/src/.*\.(ts|tsx)$'
        stages: [pre-commit]
      - id: frontend-lint
        name: frontend lint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        pass_filenames: false
        files: '^frontend/src/.*\.(ts|tsx)$'
        stages: [pre-commit]