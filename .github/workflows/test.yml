name: Test

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'frontend/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'frontend/**'
      - '.github/workflows/test.yml'

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          cd frontend
          npx playwright install chromium

      - name: Install Playwright system deps
        run: |
          cd frontend
          npx playwright install-deps chromium

      - name: Run Playwright tests
        run: |
          cd frontend
          npm test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  pytest:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: benchmarks
          POSTGRES_USER: benchmarks
          POSTGRES_PASSWORD: benchmarks
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U benchmarks"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "api/uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          cd api
          uv sync --all-groups

      - name: Run pytest
        run: |
          cd api
          uv run --frozen --group dev pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://benchmarks:benchmarks@localhost:5432/benchmarks
