name: "Deploy to FastAPI Cloud"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: "Build & Deploy"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          VITE_API_URL="" npm run build

      - name: Copy frontend build to API static dir
        run: cp -r frontend/dist api/static

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Debug token
        working-directory: api
        run: |
          echo "Token length: ${#FASTAPI_CLOUD_TOKEN}"
          uv run python -c "import os; print('token from python:', len(os.environ.get('FASTAPI_CLOUD_TOKEN', '')))"
          uv run python -c "from fastapi_cloud_cli.utils.auth import Identity; i = Identity(); print('auth_mode:', i.auth_mode); print('is_logged_in:', i.is_logged_in())"
        env:
          FASTAPI_CLOUD_TOKEN: ${{ secrets.FASTAPI_CLOUD_TOKEN }}
          FASTAPI_CLOUD_APP_ID: ${{ secrets.FASTAPI_CLOUD_APP_ID }}

      - name: Deploy to FastAPI Cloud
        working-directory: api
        run: uv run fastapi deploy
        env:
          FASTAPI_CLOUD_TOKEN: ${{ secrets.FASTAPI_CLOUD_TOKEN }}
          FASTAPI_CLOUD_APP_ID: ${{ secrets.FASTAPI_CLOUD_APP_ID }}
