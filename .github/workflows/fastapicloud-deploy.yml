name: "Deploy to FastAPI Cloud"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: "Build & Deploy"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          VITE_API_URL="" npm run build

      - name: Copy frontend build to API static dir
        run: cp -r frontend/dist api/static

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Upgrade FastAPI Cloud CLI
        working-directory: api
        run: uv add "fastapi[standard]" --upgrade

      - name: Deploy to FastAPI Cloud
        working-directory: api
        run: uv run fastapi deploy
        env:
          FASTAPI_CLOUD_TOKEN: ${{ secrets.FASTAPI_CLOUD_TOKEN }}
          FASTAPI_CLOUD_APP_ID: ${{ secrets.FASTAPI_CLOUD_APP_ID }}
