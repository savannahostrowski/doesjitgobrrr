name: Update Dashboard Data

on:
  repository_dispatch:
    types: [benchmark_completed]
  workflow_dispatch:

concurrency:
  group: dashboard-data-refresh
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Restore static data blob
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: api/.static-data-cache.json
          key: static-data-${{ github.run_id }}
          restore-keys: |
            static-data-

      - name: Generate static dashboard data
        working-directory: api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: "1"
        # Appends newly discovered benchmark runs to .static-data-cache.json,
        # then rewrites the public /data JSON files for the static frontend.
        run: uv run python generate_static_data.py --cache .static-data-cache.json --out ../frontend/public/data

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend build to API static dir
        run: |
          rm -rf api/static
          cp -r frontend/dist api/static

      - name: Deploy to FastAPI Cloud
        working-directory: api
        run: uv run fastapi deploy
        env:
          FASTAPI_CLOUD_TOKEN: ${{ secrets.FASTAPI_CLOUD_TOKEN }}
          FASTAPI_CLOUD_APP_ID: ${{ secrets.FASTAPI_CLOUD_APP_ID }}
